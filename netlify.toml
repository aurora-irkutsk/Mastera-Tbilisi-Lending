[build]
  publish = "."

# ── Редиректы ─────────────────────────────────────────────────────────────────

# Старый GitHub Pages путь → новый Netlify
[[redirects]]
  from = "/index.html"
  to   = "/"
  status = 301

# Корень без слэша → со слэшем (канонический вид)
[[redirects]]
  from = "/ru"
  to   = "/ru/"
  status = 301

[[redirects]]
  from = "/ge"
  to   = "/ge/"
  status = 301

[[redirects]]
  from = "/en"
  to   = "/en/"
  status = 301

# ── Заголовки ─────────────────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), microphone=(), camera=()"

# Манифест и сервис-воркер — отдаём без кэша, чтобы браузер видел обновления
[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type  = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type  = "application/javascript"

# Статика — долгий кэш
[[headers]]
  for = "/image/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CORS для бэкенда (API обращается к домену)
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin  = "https://mastera-tbilisi.ge"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
